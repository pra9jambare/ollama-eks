alertmanager:
  config:
    route:
      receiver: ai-analyzer
      group_wait: 10s
      group_interval: 30s
      repeat_interval: 1h

      routes:
        - matchers:
            - alertname != Watchdog
          receiver: ai-analyzer

    receivers:
      - name: ai-analyzer
        webhook_configs:
          - url: http://ai-analyzer.aiops.svc.cluster.local/analyze
            send_resolved: true

      - name: "null"
